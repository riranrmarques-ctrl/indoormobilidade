<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>playlist | drivvio</title>

  <link rel="stylesheet" href="playlist.css?v=4"/>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="playlist.js?v=4" defer></script>
</head>

<body>
  <main class="playlist-shell">

    <header class="playlist-header" id="playlistHeader">
      <a class="back-button" id="generalButton" href="painel-central.html">← Geral</a>

      <div class="header-title">
        <img class="brand-logo" src="../logo.png" onerror="this.src='logo.png'" />
        <div>
          <span class="eyebrow">Gestao da playlists</span>
          <h1>Veiculos Indoor</h1>
          <p>Gerencie as playlist e informacoes por bairro.</p>
        </div>
      </div>

      <button class="create-folder" id="createFolderButton">+ Criar nova pasta</button>
      <button class="header-return is-hidden" id="folderHeaderBackButton">← Voltar</button>
    </header>

    <section class="folder-grid" id="folderGrid"></section>

    <section class="folder-page is-hidden" id="folderPage">

      <section class="folder-detail">
        <div class="detail-layout">

          <div class="detail-info">
            <h2 id="detailTitle"></h2>

            <div class="detail-actions">
              <button id="editVehicleButton">Editar</button>
              <button id="deleteVehicleButton">Excluir</button>
            </div>
          </div>

          <div class="detail-media">
            <img id="detailMapImage"/>
          </div>

        </div>
      </section>

    </section>

  </main>

  <!-- MODAL EDITAR -->
  <div id="editModal" class="modal is-hidden">
    <div class="modal-content">

      <h2>Editar Pasta</h2>

      <input id="editNome" placeholder="Nome"/>
      <input id="editZona" placeholder="Zona"/>

      <input type="file" id="editImagem"/>

      <!-- PREVIEW -->
      <div class="preview-box">
        <img id="previewImg"/>
      </div>

      <label>Zoom</label>
      <input type="range" id="zoom" min="1" max="2.5" step="0.01" value="1">

      <label>X</label>
      <input type="range" id="posX" min="-100" max="100" value="0">

      <label>Y</label>
      <input type="range" id="posY" min="-100" max="100" value="0">

      <button id="cancelEdit">Cancelar</button>
      <button id="saveEdit">Salvar</button>

    </div>
  </div>

</body>
</html>
