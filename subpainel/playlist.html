<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>playlist | drivvio</title>

  <link rel="stylesheet" href="playlist.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="playlist.js" defer></script>
</head>

<body>
  <main class="playlist-shell">
    <header class="playlist-header" id="playlistHeader">
      <a class="back-button" id="generalButton" href="painel-central.html">
        ← Geral
      </a>

      <button class="back-button is-hidden" id="folderHeaderBackButton" type="button">
        ← Voltar
      </button>

      <div class="header-title">
        <img class="brand-logo" src="../logo.png" onerror="this.onerror=null; this.src='logo.png';" alt="drivvio" />
        <div>
          <span class="eyebrow">Gestão da playlist</span>
          <h1>Veículos Indoor</h1>
          <p id="openedFolderLabel">Gerencie as pastas e campanhas dos veículos.</p>
        </div>
      </div>

      <button class="primary-button" id="createFolderButton" type="button">
        + Nova pasta
      </button>
    </header>

    <section class="folder-grid" id="folderGrid"></section>

    <section class="folder-page is-hidden" id="folderPage">
      <section class="folder-detail">
        <div class="folder-map">
          <img id="detailMapImage" alt="Imagem da pasta" />
        </div>

        <div class="folder-info">
          <span class="eyebrow">Pasta aberta</span>
          <h2 id="detailTitle">BAIRRO DA CIDADE</h2>

          <div class="detail-line">
            <span>Zona</span>
            <strong id="detailDistrict">0 km2</strong>
          </div>

          <div class="detail-line">
            <span>Código</span>
            <button id="detailCode" class="copy-code" type="button" data-code="">---</button>
          </div>

          <div class="detail-stats">
            <article>
              <small>Veículos</small>
              <strong id="detailVehicles">0</strong>
            </article>

            <article>
              <small>Campanhas</small>
              <strong id="detailCampaigns">0</strong>
            </article>

            <article>
              <small>Quiz / QR</small>
              <strong id="detailQuizzes">0</strong>
            </article>
          </div>

          <div class="detail-actions">
            <button id="addMediaButton" type="button">+ Adicionar mídia</button>
            <button id="editVehicleButton" type="button">Editar pasta</button>
            <button id="deleteVehicleButton" type="button" class="danger">Excluir pasta</button>
          </div>
        </div>
      </section>

      <section class="playlist-panel">
        <div class="playlist-panel-header">
          <div>
            <span class="eyebrow">Arquivos</span>
            <h2>Playlist da pasta</h2>
          </div>
        </div>

        <div class="playlist-list" id="playlistList"></div>
      </section>
    </section>
  </main>

  <!-- Modal editar pasta -->
  <div class="modal is-hidden" id="editModal">
    <div class="modal-box">
      <h2>Editar pasta</h2>

      <label>
        Nome da pasta
        <input id="editNome" type="text" placeholder="Ex: Veículos Salvador" />
      </label>

      <label>
        Zona / Área
        <input id="editZona" type="text" placeholder="Ex: 12.5" />
      </label>

      <label>
        Imagem / mapa da pasta
        <input id="editImagem" type="file" accept="image/jpeg,image/jpg,image/png,image/webp" />
      </label>

      <div class="modal-actions">
        <button id="cancelEdit" type="button">Cancelar</button>
        <button id="saveEdit" type="button">Salvar</button>
      </div>
    </div>
  </div>

  <!-- Modal adicionar mídia -->
  <div class="modal is-hidden" id="uploadModal">
    <div class="modal-box">
      <h2>Adicionar mídia</h2>

      <label>
        Tipo da mídia
        <select id="mediaTipo">
          <option value="video">Vídeo</option>
          <option value="imagem">Imagem</option>
          <option value="noticia">Notícia / Link</option>
          <option value="quiz">Quiz / QR Code</option>
        </select>
      </label>

      <label>
        Nome da mídia
        <input id="mediaNome" type="text" placeholder="Ex: Campanha Atakarejo" />
      </label>

      <label id="mediaFileBox">
        Arquivo
        <input id="mediaFile" type="file" />
      </label>

      <label id="mediaLinkBox" class="is-hidden">
        URL
        <input id="mediaLink" type="url" placeholder="https://..." />
      </label>

      <div class="preview-box">
        <img id="previewImage" alt="Preview da imagem" />
        <video id="previewVideo" controls></video>
        <p id="previewEmpty">Preview da mídia</p>
      </div>

      <div class="modal-actions">
        <button id="cancelUpload" type="button">Cancelar</button>
        <button id="confirmUpload" type="button">Salvar mídia</button>
      </div>
    </div>
  </div>
</body>
</html>
