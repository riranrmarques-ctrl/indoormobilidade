<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desconto Agora</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #040816, #0a1f4d);
  color: white;
  height: 100vh;
  display: flex;
}

.main {
  display: flex;
  width: 100%;
  height: 100%;
}

.left {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 60px;
}

.right {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.logo {
  width: 260px;
  margin-bottom: 30px;
}

h1 {
  font-size: 48px;
  margin-bottom: 15px;
}

.sub {
  font-size: 18px;
  opacity: 0.8;
  margin-bottom: 40px;
}

.btn {
  width: 100%;
  max-width: 420px;
  padding: 18px;
  margin: 12px 0;
  border-radius: 18px;
  border: none;
  font-size: 18px;
  background: rgba(255,255,255,0.12);
  color: white;
  cursor: pointer;
}

.btn:hover {
  background: #1c3cff;
}

.qr-box {
  background: white;
  padding: 20px;
  border-radius: 20px;
}

/* 🔥 TIMER */
.timer {
  font-size: 32px;
  margin-top: 20px;
  font-weight: bold;
  color: #ffcc00;
}

/* telas */
#quiz2,
#resultado {
  display: none;
}
</style>
</head>

<body>

<div class="main">

  <!-- QUIZ 1 -->
  <div id="quiz1" class="main">

    <div class="left">
      <img class="logo" src="atakarejo.png">

      <h1>💰 Vamos economizar hoje?</h1>
      <p class="sub">Responda rápido e ganhe desconto agora.</p>

      <button class="btn" onclick="next()">🛒 Compras do mês</button>
      <button class="btn" onclick="next()">🍖 Carnes e promoções</button>
      <button class="btn" onclick="next()">🧼 Produtos para casa</button>
      <button class="btn" onclick="next()">🍺 Bebidas e lazer</button>
    </div>

    <div class="right">
      <img src="atakarejo.png" style="width: 70%; opacity: 0.1;">
    </div>

  </div>

  <!-- QUIZ 2 -->
  <div id="quiz2" class="main">

    <div class="left">
      <img class="logo" src="atakarejo.png">

      <h1>🔥 O que você quer agora?</h1>
      <p class="sub">Escolha sua vantagem.</p>

      <button class="btn" onclick="finalizar()">💸 Pagar mais barato</button>
      <button class="btn" onclick="finalizar()">🎁 Ver ofertas</button>
    </div>

  </div>

  <!-- RESULTADO -->
  <div id="resultado" class="main">

    <div class="left">
      <img class="logo" src="atakarejo.png">

      <h1>🎉 Oferta desbloqueada!</h1>
      <p class="sub">Escaneie o QR Code ao lado.</p>

      <!-- 🔥 TIMER VISÍVEL -->
      <div id="timer" class="timer">⏳ 30s</div>
    </div>

    <div class="right">
      <div id="qrcode" class="qr-box"></div>
    </div>

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
function next() {
  document.getElementById("quiz1").style.display = "none";
  document.getElementById("quiz2").style.display = "flex";
}

function finalizar() {
  document.getElementById("quiz2").style.display = "none";
  document.getElementById("resultado").style.display = "flex";

  document.getElementById("qrcode").innerHTML = "";

  new QRCode(document.getElementById("qrcode"), {
    text: "https://www.atakarejo.com.br/",
    width: 260,
    height: 260
  });

  iniciarTimer();
}

/* 🔥 CONTADOR */
function iniciarTimer() {
  let tempo = 30;
  const el = document.getElementById("timer");

  const intervalo = setInterval(() => {
    tempo--;
    el.innerHTML = "⏳ " + tempo + "s";

    if (tempo <= 0) {
      clearInterval(intervalo);
      location.reload();
    }
  }, 1000);
}
</script>

</body>
</html>
